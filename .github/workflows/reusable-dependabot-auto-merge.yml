##
# Reusable: Dependabot auto-merge
#
# Purpose:
# - Keep Dependabot PR branches up-to-date (best-effort rebase)
# - Enable GitHub auto-merge (squash by default)
#
# Usage (thin caller in any repo):
#
# name: Dependabot (auto-merge)
# on:
#   pull_request:
# jobs:
#   dependabot-auto-merge:
#     if: github.actor == 'dependabot[bot]'
#     permissions:
#       contents: write
#       pull-requests: write
#     uses: winccoa-tools-pack/.github/.github/workflows/reusable-dependabot-auto-merge.yml@main
#     with:
#       pr_url: ${{ github.event.pull_request.html_url }}
#

name: "Reusable: Dependabot Auto-merge"

on:
  workflow_call:
    inputs:
      pr_url:
        description: "Pull request URL (e.g. https://github.com/OWNER/REPO/pull/123)"
        required: true
        type: string
      approve_pr:
        description: "Whether to auto-approve the PR (required only if branch protection requires approvals)"
        required: false
        default: false
        type: boolean
      merge_method:
        description: "Merge method (squash|merge|rebase)"
        required: false
        default: "squash"
        type: string
      update_branch:
        description: "Whether to try updating the PR branch before enabling auto-merge"
        required: false
        default: true
        type: boolean
    secrets:
      REPO_ADMIN_TOKEN:
        description: "PAT with repo access (recommended). Ensures branch updates trigger downstream workflows; falls back to GITHUB_TOKEN if unset."
        required: false

permissions: {}

jobs:
  auto-merge:
    name: Enable auto-merge for Dependabot PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Validate actor (defense in depth)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.actor }}" != "dependabot[bot]" ]; then
            echo "Not running: github.actor is '${{ github.actor }}'" >&2
            exit 1
          fi

      - name: Update branch if behind (best-effort)
        if: inputs.update_branch
        shell: bash
        env:
          PR_URL: ${{ inputs.pr_url }}
          GH_REPO: ${{ github.repository }}
          # NOTE: Updating PR branches can be blocked when the PR modifies workflow files.
          # If you want this to work for workflow-touching PRs, provide REPO_ADMIN_TOKEN
          # with sufficient workflow permissions.
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh pr update-branch --repo "$GH_REPO" --rebase "$PR_URL" || true

      - name: Approve PR (optional)
        if: inputs.approve_pr
        shell: bash
        env:
          PR_URL: ${{ inputs.pr_url }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          pr_number=$(echo "$PR_URL" | sed -n 's#.*/pull/\([0-9]\+\).*#\1#p')
          if [ -z "$pr_number" ]; then
            echo "Could not parse PR number from URL: $PR_URL" >&2
            exit 1
          fi

          me=$(gh api user --jq .login)
          echo "Approver identity: $me"

          already=$(gh api "/repos/$GH_REPO/pulls/$pr_number/reviews" --jq "[.[] | select(.user.login == \"$me\" and .state == \"APPROVED\")] | length")
          if [ "$already" -gt 0 ]; then
            echo "Already approved by $me; skipping duplicate approval comment."
            exit 0
          fi

          gh pr review --repo "$GH_REPO" --approve "$PR_URL" --body "Auto-approved Dependabot PR." || true

      - name: Enable auto-merge
        shell: bash
        env:
          PR_URL: ${{ inputs.pr_url }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail
          method="${{ inputs.merge_method }}"
          case "$method" in
            squash|merge|rebase) ;;
            *) echo "Invalid merge_method: '$method' (expected squash|merge|rebase)" >&2; exit 2;;
          esac
          gh pr merge --repo "$GH_REPO" --auto --"$method" "$PR_URL"

      - name: Label PR (merge without review)
        shell: bash
        env:
          PR_URL: ${{ inputs.pr_url }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail
          label="merge-without-review"

          # Create label if missing (best-effort)
          gh api --silent "/repos/$GH_REPO/labels/$label" >/dev/null 2>&1 || \
            gh api --silent -X POST "/repos/$GH_REPO/labels" -f name="$label" -f color="BFDADC" -f description="Configured to merge automatically without waiting for review." >/dev/null 2>&1 || true

          gh pr edit --repo "$GH_REPO" "$PR_URL" --add-label "$label" || true
