##
# Reusable: Dependabot refresh on base-branch updates
#
# Purpose:
# - Whenever the base branch (e.g. develop) moves forward, Dependabot PR branches may become behind.
# - This workflow finds all open Dependabot PRs targeting that base branch and:
#   1) updates/rebases the branch (best-effort)
#   2) enables auto-merge (squash by default)
#
# Usage (thin caller in any repo):
#
# name: Dependabot (refresh)
# on:
#   push:
#     branches: [develop]
# jobs:
#   dependabot-refresh:
#     permissions:
#       contents: write
#       pull-requests: write
#     uses: winccoa-tools-pack/.github/.github/workflows/reusable-dependabot-refresh.yml@main
#     secrets: inherit
#     with:
#       base_branch: develop
#       merge_method: squash
#

name: "Reusable: Dependabot Refresh"

on:
  workflow_call:
    inputs:
      base_branch:
        description: "Base branch to target (usually develop)"
        required: false
        default: "develop"
        type: string
      merge_method:
        description: "Merge method to auto-enable (squash|merge|rebase)"
        required: false
        default: "squash"
        type: string
      update_branch:
        description: "Whether to try updating/rebasing PR branches before enabling auto-merge"
        required: false
        default: true
        type: boolean
      approve_prs:
        description: "Whether to auto-approve Dependabot PRs (use only if branch protection requires approvals)"
        required: false
        default: false
        type: boolean
      enable_auto_merge:
        description: "Whether to enable auto-merge on PRs (true recommended)"
        required: false
        default: true
        type: boolean
    secrets:
      REPO_ADMIN_TOKEN:
        description: "PAT with repo access (recommended). Ensures branch updates trigger downstream workflows; falls back to GITHUB_TOKEN if unset."
        required: false

permissions: {}

concurrency:
  group: dependabot-refresh-${{ github.repository }}-${{ inputs.base_branch }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: List open Dependabot PRs
        id: list
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail

          # Collect PR URLs (one per line) for open Dependabot PRs targeting BASE_BRANCH
          gh pr list \
            --repo "$GH_REPO" \
            --state open \
            --base "$BASE_BRANCH" \
            --author "dependabot[bot]" \
            --json url \
            --limit 200 \
            > prs.json

          count=$(jq 'length' prs.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count Dependabot PR(s) targeting '$BASE_BRANCH'."

          if [ "$count" -eq 0 ]; then
            exit 0
          fi

          jq -r '.[].url' prs.json > pr_urls.txt

      - name: Update branches (best-effort)
        if: steps.list.outputs.count != '0' && inputs.update_branch
        shell: bash
        env:
          # NOTE: Updating PR branches can be blocked when the PR modifies workflow files.
          # If you want this to work for workflow-touching PRs, provide REPO_ADMIN_TOKEN
          # with sufficient workflow permissions.
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          while IFS= read -r pr; do
            echo "Updating branch: $pr"
            gh pr update-branch --repo "$GH_REPO" --rebase "$pr" || true
          done < pr_urls.txt

      - name: Approve PRs (optional)
        if: steps.list.outputs.count != '0' && inputs.approve_prs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          me=$(gh api user --jq .login)
          echo "Approver identity: $me"
          while IFS= read -r pr; do
            echo "Approving: $pr"
            pr_number=$(echo "$pr" | sed -n 's#.*/pull/\([0-9]\+\).*#\1#p')
            if [ -z "$pr_number" ]; then
              echo "Could not parse PR number from URL: $pr" >&2
              continue
            fi

            already=$(gh api "/repos/$GH_REPO/pulls/$pr_number/reviews" --jq "[.[] | select(.user.login == \"$me\" and .state == \"APPROVED\")] | length")
            if [ "$already" -gt 0 ]; then
              echo "Already approved by $me; skipping."
              continue
            fi

            gh pr review --repo "$GH_REPO" --approve "$pr" --body "Auto-approved Dependabot PR." || true
          done < pr_urls.txt

      - name: Enable auto-merge
        if: steps.list.outputs.count != '0' && inputs.enable_auto_merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
          MERGE_METHOD: ${{ inputs.merge_method }}
        run: |
          set -euo pipefail

          method="$MERGE_METHOD"
          case "$method" in
            squash|merge|rebase) ;;
            *) echo "Invalid merge_method: '$method' (expected squash|merge|rebase)" >&2; exit 2;;
          esac

          while IFS= read -r pr; do
            echo "Enabling auto-merge ($method): $pr"
            gh pr merge --repo "$GH_REPO" --auto --"$method" "$pr" || true
          done < pr_urls.txt

      - name: Label PRs (merge without review)
        if: steps.list.outputs.count != '0' && inputs.enable_auto_merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          label="merge-without-review"

          # Create label if missing (best-effort)
          gh api --silent "/repos/$GH_REPO/labels/$label" >/dev/null 2>&1 || \
            gh api --silent -X POST "/repos/$GH_REPO/labels" -f name="$label" -f color="BFDADC" -f description="Configured to merge automatically without waiting for review." >/dev/null 2>&1 || true

          while IFS= read -r pr; do
            gh pr edit --repo "$GH_REPO" "$pr" --add-label "$label" || true
          done < pr_urls.txt
