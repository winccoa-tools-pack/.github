##
# Reusable CI/CD Pipeline
#
# Centralized CI/CD workflow for all winccoa-tools-pack repositories.
# Supports both VS Code extensions and npm library projects via inputs.
#
# Usage (VS Code extension):
#   jobs:
#     ci-cd:
#       uses: winccoa-tools-pack/.github/.github/workflows/reusable-ci-cd.yml@main
#       with:
#         build_command: "npm run compile:tsc"
#         enable_coverage: true
#         enable_xvfb: true
#         integration_test_command: 'xvfb-run -a npx --no-install vscode-test --label integrationTests'
#         fixture_config_path: "./src/test/fixtures/projects/runnable/config/config"
#       secrets: inherit
#
# Usage (npm library):
#   jobs:
#     ci-cd:
#       uses: winccoa-tools-pack/.github/.github/workflows/reusable-ci-cd.yml@main
#       with:
#         integration_test_command: 'xvfb-run -s "-screen 0 1280x1024x24" node --import tsx scripts/run-node-tests.ts test/integration'
#       secrets: inherit
##

name: "Reusable: CI/CD Pipeline"

on:
  workflow_call:
    inputs:
      build_command:
        description: "Build command to run (e.g., 'npm run build' or 'npm run compile:tsc')"
        required: false
        default: "npm run build"
        type: string
      enable_coverage:
        description: "Enable test coverage collection on a specific matrix cell (ubuntu + coverage_node_version)"
        required: false
        default: false
        type: boolean
      coverage_node_version:
        description: "Node.js version used for coverage collection"
        required: false
        default: "25.x"
        type: string
      enable_xvfb:
        description: "Set up Xvfb virtual display for Linux tests (required for VS Code extensions)"
        required: false
        default: false
        type: boolean
      enable_integration_tests:
        description: "Enable WinCC OA Docker-based integration tests"
        required: false
        default: true
        type: boolean
      unit_test_retries:
        description: "How many times to retry unit tests on transient failures (e.g., VS Code download ECONNRESET)"
        required: false
        default: 5
        type: number
      unit_test_retry_delay_seconds:
        description: "Delay between unit test retries"
        required: false
        default: 20
        type: number
      integration_test_command:
        description: >
          Command to run inside the Docker container for integration tests.
          Must include xvfb-run prefix if a display is needed.
          Examples:
            VS Code: 'xvfb-run -a npx --no-install vscode-test --label integrationTests'
            npm:     'xvfb-run -s "-screen 0 1280x1024x24" node --import tsx scripts/run-node-tests.ts test/integration'
        required: false
        default: ""
        type: string
      fixture_config_path:
        description: "Host-side path to WinCC OA fixture config file (validated before integration tests)"
        required: false
        default: "./test/fixtures/projects/runnable/config/config"
        type: string
      docker_image_name:
        description: "Docker image for WinCC OA integration tests"
        required: false
        default: "mpokornyetm/winccoa-tools-pack-npm-winccoa-core:npm-winccoa-core"
        type: string
    secrets:
      DOCKER_USER:
        description: "Docker Hub username (optional — anonymous pull used if empty)"
        required: false
      DOCKER_PASSWORD:
        description: "Docker Hub password / token (optional)"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Changelog validation (release/hotfix PRs to main only)
  # ────────────────────────────────────────────────────────────────
  changelog:
    name: Changelog contains version heading
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Skip (not a release/hotfix PR to main)
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))) }}
        run: echo "Changelog check skipped (only enforced for release/* and hotfix/* PRs targeting main)."

      - name: Verify CHANGELOG.md is updated for package.json version
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/')) }}
        run: node scripts/check-changelog-version.mjs

  # ────────────────────────────────────────────
  # Job 2 — Lint
  # ────────────────────────────────────────────
  lint:
    needs: [changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run linting
        run: npm run lint && npm run lint:md

  # ────────────────────────────────────────────
  # Job 3 — Format
  # ────────────────────────────────────────────
  format:
    needs: [changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run format check
        run: npm run format:check

  # ────────────────────────────────────────────
  # Job 4 — Unit tests (matrix)
  # ────────────────────────────────────────────
  test:
    needs: [format, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
# node-version list contains all our supported node version
# to eliminate count of allocated runners, keep this list small
# here ere offcial node supported versions: https://nodejs.org/en/about/previous-releases
# 22 is still supported in maintanance, but to decrease consts and waititng periods - I will remove it from our CI-CD
        node-version: [24.x, 25.x]
        exclude:
          # Node 24.x is currently flaky on Windows for VS Code extension tests in CI.
          # Keep Windows coverage on the latest stable (25.x) while retaining 24.x coverage on Ubuntu.
          - os: windows-latest
            node-version: 24.x
    env:
      CI: true
      # Cache location for VS Code downloads used by `vscode-test`.
      # This reduces flakiness from transient download failures (e.g., ECONNRESET).
      VSCODE_TEST_CACHE_PATH: ${{ github.workspace }}/.vscode-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Restore VS Code test download cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VSCODE_TEST_CACHE_PATH }}
          key: vscode-test-cache-v1-${{ runner.os }}-${{ matrix.node-version }}
          restore-keys: |
            vscode-test-cache-v1-${{ runner.os }}-${{ matrix.node-version }}
            vscode-test-cache-v1-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: ${{ inputs.build_command }}

      # ── Xvfb (VS Code extensions need a display) ──
      - name: Setup virtual display (Linux)
        if: ${{ inputs.enable_xvfb && runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # ── Coverage run (single matrix cell) ──
      - name: Run unit tests (coverage - single job)
        if: ${{ inputs.enable_coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == inputs.coverage_node_version }}
        shell: bash
        run: |
          set -euo pipefail

          RETRIES="${{ inputs.unit_test_retries }}"
          DELAY="${{ inputs.unit_test_retry_delay_seconds }}"

          if [ -z "$RETRIES" ] || [ "$RETRIES" -lt 1 ]; then
            RETRIES=1
          fi
          if [ -z "$DELAY" ] || [ "$DELAY" -lt 0 ]; then
            DELAY=0
          fi

          for i in $(seq 1 "$RETRIES"); do
            echo "Running unit tests with coverage (attempt $i/$RETRIES)"
            if npm run test:unit:coverage; then
              exit 0
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Unit tests failed; retrying in ${DELAY}s..."
              sleep "$DELAY"
            fi
          done
          exit 1
        env:
          CI: true
      - name: Run unit tests
        if: ${{ !(inputs.enable_coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == inputs.coverage_node_version) }}
        shell: bash
        run: |
          set -euo pipefail

          RETRIES="${{ inputs.unit_test_retries }}"
          DELAY="${{ inputs.unit_test_retry_delay_seconds }}"

          if [ -z "$RETRIES" ] || [ "$RETRIES" -lt 1 ]; then
            RETRIES=1
          fi
          if [ -z "$DELAY" ] || [ "$DELAY" -lt 0 ]; then
            DELAY=0
          fi

          for i in $(seq 1 "$RETRIES"); do
            echo "Running unit tests (attempt $i/$RETRIES)"
            if npm run test:unit; then
              exit 0
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Unit tests failed; retrying in ${DELAY}s..."
              sleep "$DELAY"
            fi
          done
          exit 1
        env:
          CI: true

      # ── Coverage artifacts & reporting ──
      - name: Upload unit coverage artifact
        if: ${{ inputs.enable_coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == inputs.coverage_node_version }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unitTests
          path: |
            coverage/unitTests
      - name: Upload coverage to Codecov
        if: ${{ inputs.enable_coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == inputs.coverage_node_version }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/unitTests/lcov.info
          flags: unittests
          name: unit-coverage
          fail_ci_if_error: false
          verbose: true
      - name: Unit coverage summary
        if: ${{ inputs.enable_coverage && matrix.os == 'ubuntu-latest' && matrix.node-version == inputs.coverage_node_version }}
        shell: bash
        run: |
          node scripts/write-coverage-summary.mjs unitTests >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────
  # Job 5 — WinCC OA integration tests (Docker)
  # ────────────────────────────────────────────────────────────────
  integration-winccoa:
    name: Integration Tests - WinCC OA
    needs: [test]
    if: ${{ inputs.enable_integration_tests && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      OOM_KILLED: 'false'
      WORKDIR: /workspace
      IMAGE_NAME: ${{ inputs.docker_image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub (optional)
        shell: bash
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${DOCKER_USER:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
          else
            echo "Docker credentials not available, attempting to pull public image"
          fi
      - name: Pull WinCC OA image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "$IMAGE_NAME"
      - name: Verify runnable fixture config exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ inputs.fixture_config_path }}"
      - name: Install dependencies (host)
        run: npm ci
      - name: Build package (host)
        run: ${{ inputs.build_command }}
      - name: Run WinCC OA container
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name winccoa-ci \
            --shm-size=2g \
            --memory=8g \
            -v "$GITHUB_WORKSPACE":$WORKDIR:rw \
            -e CI=true \
            -e OAINST=/opt/WinCC_OA \
            -e OAPROJ=$WORKDIR/test/fixtures/projects/runnable \
            -w $WORKDIR \
            "$IMAGE_NAME" bash -lc 'sleep 2'
      - name: Verify Xvfb available
        shell: bash
        run: |
          set -euo pipefail
          docker exec --user root winccoa-ci sh -c 'command -v xvfb-run >/dev/null 2>&1 || (echo "::error::xvfb-run not found in container"; exit 1)'
      - name: Run all integration tests inside container
        shell: bash
        run: |
          set -uo pipefail
          EXIT_CODE=0
          docker exec --user root winccoa-ci sh -c '
            set -e
            echo "Node version: $(node -v)"
            echo "Running integration tests..."
            ${{ inputs.integration_test_command }}
          ' || EXIT_CODE=$?
          
          # Exit code 137 = OOM killed by kernel. GitHub runners have limited memory.
          # Integration tests require WinCC OA + VS Code + Electron which exceeds CI limits.
          # PR authors must confirm local run passed (see integration test output for copy-paste template).
          if [ "$EXIT_CODE" -eq 137 ]; then
            echo "::warning::Integration tests were OOM-killed (exit 137). PR author must confirm local run passed."
            echo "OOM_KILLED=true" >> "$GITHUB_ENV"
            
            # Write summary for both step summary and PR comment
            {
              echo "## ⚠️ Integration Tests: Manual Confirmation Required"
              echo ""
              echo "The integration tests were killed due to memory limits (exit code 137)."
              echo ""
              echo "**PR author**: Please run integration tests locally and paste the result in the PR:"
              echo ""
              echo "\`\`\`bash"
              echo "npm run test:integration"
              echo "\`\`\`"
              echo ""
              echo "Copy the **Local Integration Test Result** block from the test output into this PR."
            } | tee -a "$GITHUB_STEP_SUMMARY" > /tmp/oom-comment.md
            exit 0
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Integration tests failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
      - name: Post OOM warning as PR comment
        if: ${{ always() && github.event_name == 'pull_request' && env.OOM_KILLED == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/oom-comment.md
      - name: Capture system resource usage
        if: ${{ always() }}
        shell: bash
        run: |
          echo "==== Host System Memory Usage ===="
          free -h
          echo ""
          echo "==== Top 20 Processes by Memory (Host) ===="
          ps aux --sort=-%mem | head -21
          echo ""
          echo "==== Top 20 Processes by CPU (Host) ===="
          ps aux --sort=-%cpu | head -21
          echo ""
          echo "==== Docker Container Stats ===="
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}" || true
          echo ""
          echo "==== Processes inside Container ===="
          docker exec winccoa-ci ps aux --sort=-%mem 2>/dev/null | head -21 || echo "(container not running)"
      - name: Collect logs on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "==== docker logs ===="
          docker logs winccoa-ci || true
          echo "==== dmesg (check for OOM Killer) ===="
          dmesg | tail -n 50 || true
      - name: Stop and remove container
        if: ${{ always() }}
        shell: bash
        run: |
          docker rm -f winccoa-ci || true

  # ────────────────────────────────────────────────────────────────
  # Job 6 — Git Flow validation (PR only)
  # ────────────────────────────────────────────────────────────────
  gitflow-validation:
    name: Validate Git Flow + Conventional Commits
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate branch + target + commits
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('This workflow only supports pull_request events.');
              return;
            }

            const headRef = pr.head.ref;   // e.g. feature/foo
            const baseRef = pr.base.ref;   // e.g. develop

            const rules = [
              // main to develop means merging main back into develop (git flow)
              { type: 'main', prefixes: ['main'], expectedBase: 'develop' },
              // fork develop into base develop
              { type: 'fork', prefixes: ['develop'], expectedBase: 'develop' },
              { type: 'feature', prefixes: ['feature/'], expectedBase: 'develop' },
              { type: 'bugfix',  prefixes: ['bugfix/'],  expectedBase: 'develop' },
              { type: 'chore',   prefixes: ['chore/'],   expectedBase: 'develop', botOnly: true },
              { type: 'dependabot', prefixes: ['dependabot/'], expectedBase: 'develop', botOnly: true },
              { type: 'hotfix',  prefixes: ['hotfix/'],  expectedBase: 'main' },
              { type: 'release', prefixes: ['release/'], expectedBase: 'main' },
            ];

            const matchingRule = rules.find(r => r.prefixes.some(p => headRef.startsWith(p)));

            const errors = [];
            const warnings = [];

            if (!matchingRule) {
              errors.push(
                `Branch "${headRef}" does not follow Git Flow naming convention. ` +
                `Expected one of: ${rules.flatMap(r => r.prefixes).join(', ')}`
              );
            } else {
              if (matchingRule.botOnly === true && pr.user && pr.user.type !== 'Bot') {
                errors.push(
                  `Branch "${headRef}" is reserved for bot PRs (rule: ${matchingRule.type}). ` +
                  `PR author type is "${pr.user.type}".`
                );
              }

              if (baseRef !== matchingRule.expectedBase) {
                errors.push(
                  `Invalid target branch: ${matchingRule.type} branches must target "${matchingRule.expectedBase}", ` +
                  `but this PR targets "${baseRef}".`
                );
              }

              if (matchingRule.type === 'feature' || matchingRule.type === 'bugfix') {
                warnings.push('Reminder: feature/bugfix branches should be created from "develop" (cannot be validated reliably via GitHub API).');
              }
              if (matchingRule.type === 'release') {
                warnings.push('Reminder: release branches should be created from "develop" and then merged into "main" (branch source cannot be validated reliably via GitHub API).');
              }
              if (matchingRule.type === 'hotfix') {
                warnings.push('Reminder: hotfix branches should be created from "main" (branch source cannot be validated reliably via GitHub API).');
              }
            }

            // Conventional Commits validation
            // Squash merge uses the PR title as the final commit message.
            const conventionalRe = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^\r\n()]+\))?(!)?:\s.+/;

            const isBotPr = Boolean(pr.user && pr.user.type === 'Bot');
            const skipConventionalForBot = isBotPr && matchingRule && matchingRule.botOnly === true;
            if (skipConventionalForBot) {
              core.notice(`Skipping Conventional Commits validation for bot PR on ${matchingRule.type} branch (${headRef}).`);
              return;
            }

            const title = String(pr.title || '').trim();
            if (!title) {
              errors.push('PR title is empty; expected a Conventional Commits style title (used for squash merge).');
            } else if (!conventionalRe.test(title)) {
              errors.push(
                `PR title does not follow Conventional Commits (used for squash merge). ` +
                `Expected e.g. "feat(scope): subject" or "fix: subject". Got: "${title}".`
              );
            }

            for (const w of warnings) {
              core.warning(w);
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n\n'));
            } else {
              core.notice('Git Flow validation passed.');
              core.notice('Reminder: delete the branch after merge (feature/bugfix/release/hotfix).');
            }

  # ────────────────────────────────────────────────────────────────
  # Job 7 — Remind to delete merged branch (PR closed + merged)
  # ────────────────────────────────────────────────────────────────
  remind-branch-deletion:
    name: Remind to delete merged branch
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Comment if branch still exists
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            // Only meaningful for branches within the same repo.
            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              core.notice('PR is from a fork; skipping branch deletion reminder.');
              return;
            }

            const { owner, repo } = context.repo;
            const headRef = pr.head.ref;

            let branchExists = true;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${headRef}` });
            } catch (e) {
              branchExists = false;
            }

            if (!branchExists) {
              core.notice(`Branch ${headRef} is already deleted.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: [
                '### 🔍 Git Flow Validation',
                '',
                '- [ ] Branch will be deleted after merge (for feature/hotfix/release branches)',
                '',
                `This PR was merged, but branch \`${headRef}\` still exists. Consider deleting it to keep the repo tidy.`,
              ].join('\n'),
            });

  # ────────────────────────────────────────────────────────────────
  # Job 8 — Required gate (branch protection target)
  # ────────────────────────────────────────────────────────────────
  required:
    name: CI/CD Pipeline - Required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - lint
      - format
      - test
      - integration-winccoa
      - gitflow-validation
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          RESULTS=(
            "lint:${{ needs.lint.result }}"
            "format:${{ needs.format.result }}"
            "test:${{ needs.test.result }}"
            "integration-winccoa:${{ needs['integration-winccoa'].result }}"
            "gitflow-validation:${{ needs['gitflow-validation'].result }}"
          )
          echo "Job results:"
          printf ' - %s\n' "${RESULTS[@]}"
          FAIL=0
          for r in "${RESULTS[@]}"; do
            status="${r#*:}"
            case "$status" in
              success|skipped)
                ;;
              *)
                echo "::error::Required job did not succeed: $r"
                FAIL=1
                ;;
            esac
          done
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
