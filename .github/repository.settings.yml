# Repository settings applied via GitHub REST API by .github/workflows/apply-settings-and-rulesets.yml
# This is the organization-level .github repo — it hosts shared workflows, templates, and community health files.

description: "Organization-level community health files, reusable GitHub Actions workflows, issue templates, and shared configuration for all winccoa-tools-pack repositories."
homepage: "https://github.com/winccoa-tools-pack"
default_branch: "main"

has_issues: true
has_wiki: false

allow_squash_merge: true
allow_merge_commit: true
allow_rebase_merge: false
allow_auto_merge: true

delete_branch_on_merge: true

topics:
  - winccoa
  - wincc-oa
  - automation
  - scada
  - hmi
  - industrial-automation
  - Siemens
  - ETM
  - github-org
  - reusable-workflows
  - community-health

security:
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true
